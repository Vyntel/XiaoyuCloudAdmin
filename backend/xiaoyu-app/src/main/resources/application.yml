server:
  port: 8080

spring:
  application:
    name: xiaoyu-app
  profiles:
    active: dev
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# 小羽框架配置
xiaoyu:
  mode: monolith
  security:
    enabled: true
    ignore-urls:
      - /auth/login
      - /auth/register
      - /auth/captcha
      - /auth/logout
      - /health
      - /actuator/**
      - /swagger-ui/**
      - /v3/api-docs/**
      - /doc.html
      - /webjars/**
      - /favicon.ico

# MyBatis-Flex 配置
mybatis-flex:
  configuration:
    # 驼峰命名转换
    map-underscore-to-camel-case: true
    # 日志实现
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Spring Boot Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Knife4j 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-suffix: "-"
    operations-suffix: "-"
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.xiaoyu
  knife4j:
    enable: true
    setting:
      language: zh_CN

# 日志配置
logging:
  level:
    com.xiaoyu: debug
    org.springframework: info
    com.mybatisflex: debug