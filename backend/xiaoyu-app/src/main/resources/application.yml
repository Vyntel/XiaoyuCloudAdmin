server:
  port: 8080

spring:
  application:
    name: xiaoyu-app
  profiles:
    active: dev
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  # Nacos配置(单体模式关闭)
  cloud:
    nacos:
      config:
        enabled: false
        import-check:
          enabled: false
      discovery:
        enabled: false


# 小羽框架配置
xiaoyu:
  mode: monolith
  security:
    enabled: true
    ignore-urls:
      - /auth/login
      - /auth/register
      - /auth/captcha
      - /auth/logout
      - /health
      - /actuator/**
      - /swagger-ui/**
      - /v3/api-docs/**
      - /doc.html
      - /webjars/**
      - /favicon.ico
  swagger:
    enabled: true
    title: "小羽快速开发框架 API"
    description: "小羽快速开发框架 API 文档"
    version: "1.0.0"
    groups:
      - name: "auth"
        title: "认证授权"
        description: "用户登录注册、Token管理"
        packageScan: "com.xiaoyu.module.auth"
      - name: "system"
        title: "系统管理"
        description: "系统用户管理"
        packageScan: "com.xiaoyu.module.system"

# MyBatis-Flex 配置
mybatis-flex:
  configuration:
    # 驼峰命名转换
    map-underscore-to-camel-case: true
    # 日志实现
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Spring Boot Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always


# Knife4j 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'auth'
      paths-to-match: '/auth/**'
      packages-to-scan: 'com.xiaoyu.module.auth'
    - group: 'system'
      paths-to-match: '/system/**'
      packages-to-scan: 'com.xiaoyu.module.system'
  knife4j:
    enable: true
    setting:
      language: zh_CN

# 日志配置
logging:
  level:
    com.xiaoyu: debug
    org.springframework: info
    com.mybatisflex: debug