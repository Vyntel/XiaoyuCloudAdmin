server:
  port: 8080

spring:
  application:
    name: xiaoyu-app
  profiles:
    active: dev
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# 小羽框架配置
xiaoyu:
  mode: monolith
  security:
    enabled: true
    ignore-urls:
      - /auth/login
      - /auth/register
      - /auth/captcha
      - /auth/logout
      - /health
      - /actuator/**

# MyBatis-Flex 配置
mybatis-flex:
  configuration:
    # 驼峰命名转换
    map-underscore-to-camel-case: true
    # 日志实现
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Spring Boot Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    com.xiaoyu: debug
    org.springframework: info
    com.mybatisflex: debug